name: Build Wan22 KJ Env Image

on:
  workflow_dispatch:
    inputs:
      registry:
        description: "Container registry: ghcr or dockerhub"
        required: true
        default: ghcr
      image_name:
        description: Image name without owner
        required: true
        default: codex-wan22-kj-comfy
      image_tag:
        description: Image tag
        required: true
        default: cuda129-py312-kj-v3
  push:
    paths:
      - docker/wan22-kj-comfy-env/**
      - .github/workflows/build-wan22-kj-env-image.yml

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          registry="${{ github.event.inputs.registry || 'ghcr' }}"
          image_name="${{ github.event.inputs.image_name || 'codex-wan22-kj-comfy' }}"
          image_tag="${{ github.event.inputs.image_tag || 'cuda129-py312-kj-v3' }}"
          registry="$(printf '%s' "$registry" | tr '[:upper:]' '[:lower:]')"
          image_name="$(printf '%s' "$image_name" | tr '[:upper:]' '[:lower:]')"
          case "$registry" in
            ghcr)
              owner="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
              image="ghcr.io/${owner}/${image_name}"
              ;;
            dockerhub)
              if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
                echo "DOCKERHUB_USERNAME secret is required for dockerhub registry." >&2
                exit 1
              fi
              image="${{ secrets.DOCKERHUB_USERNAME }}/${image_name}"
              ;;
            *)
              echo "Unsupported registry: $registry" >&2
              exit 1
              ;;
          esac
          echo "registry=${registry}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.meta.outputs.registry == 'dockerhub'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        if: steps.meta.outputs.registry == 'ghcr'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/wan22-kj-comfy-env
          file: docker/wan22-kj-comfy-env/Dockerfile
          platforms: linux/amd64
          push: true
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Codex Wan2.2 KJ ComfyUI environment image
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
