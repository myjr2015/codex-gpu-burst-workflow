name: Build Wan22 KJ Env Image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: Docker Hub image name
        required: true
        default: codex-wan22-kj-comfy
      image_tag:
        description: Image tag
        required: true
        default: cuda129-py312-kj-v1
  push:
    paths:
      - docker/wan22-kj-comfy-env/**
      - .github/workflows/build-wan22-kj-env-image.yml

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          image_name="${{ github.event.inputs.image_name || 'codex-wan22-kj-comfy' }}"
          image_tag="${{ github.event.inputs.image_tag || 'cuda129-py312-kj-v1' }}"
          echo "image=${{ secrets.DOCKERHUB_USERNAME }}/${image_name}" >> "$GITHUB_OUTPUT"
          echo "tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/wan22-kj-comfy-env
          file: docker/wan22-kj-comfy-env/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
