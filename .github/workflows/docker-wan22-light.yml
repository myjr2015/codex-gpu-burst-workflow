name: build-wan22-light-image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docker/wan22-root-canvas/**
      - .github/workflows/docker-wan22-light.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push 1.2-light
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/wan22-root-canvas/Dockerfile
          push: true
          tags: j1c2k3/codex-comfy-wan22-root-canvas:1.2-light
          provenance: false
